<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project KAI - Survey Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            --primary-main: #64748b;
            --accent-blue: #38bdf8;
            --night-deep: #020617;
            --fog-overlay: rgba(226, 232, 240, 0.03);
            --white-soft: #f8fafc;
            --dark-text: #f1f5f9;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            background: linear-gradient(180deg, #020617 0%, #0f172a 60%, #1e293b 100%);
            color: var(--dark-text);
            overflow-x: hidden;
        }

        /* Fog Animation Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 200%; height: 100%;
            background: rgba(255, 255, 255, 0.03);
            filter: blur(50px);
            border-radius: 50%;
            animation: moveFog 25s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes moveFog {
            from { transform: translateX(-50%) translateY(10%); }
            to { transform: translateX(0%) translateY(-10%); }
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            border-radius: 30px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            padding: 24px 20px;
            position: relative;
            z-index: 1;
        }

        .welcome-title { font-family: 'Roboto Mono', monospace; font-size: 2.2rem; font-weight: 700; line-height: 1.2;
            color: #fff; text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }
        .project-name { color: var(--accent-blue); font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 600;
            margin-bottom: 8px; }

        #start-btn {
            margin-top: 2rem;
            padding: 0.8rem 3rem; border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.4); background: rgba(56, 189, 248, 0.05);
            color: #38bdf8;
            font-weight: 700; letter-spacing: 0.1em;
            transition: all 0.4s ease; cursor: pointer;
        }
        #start-btn:hover { background: rgba(56, 189, 248, 0.15);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2); transform: translateY(-2px);
        }

        .user-card {
            display: flex;
            flex-direction: column; gap: 0.5rem;
            padding: 1.2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.04);
            background: rgba(255,255,255,0.02); cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 0.8rem;
        }
        .user-card:hover { background: rgba(56, 189, 248, 0.04);
            border-color: rgba(56, 189, 248, 0.3); transform: translateY(-3px); }

        .avatar-circle { width: 40px;
            height: 40px; border-radius: 12px; background: #1e293b; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); color: var(--accent-blue); font-weight: 700;
        }
        .search-input { width: 100%; padding: 0.7rem 1rem; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05); background: rgba(2, 6, 23, 0.4); color: #fff; margin-bottom: 1.5rem; outline: none;
        }
        
        /* Navigation Buttons */
        .top-nav {
            position: fixed; top: 16px; right: 16px;
            display: flex; gap: 8px; z-index: 50;
        }
        .nav-btn {
            border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 600;
            backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s;
        }
        #user-demo-btn { color: #fff; background: rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.3); }
        #user-demo-btn:hover { background: rgba(56, 189, 248, 0.4); transform: translateY(-1px); }
        #edit-users-btn { color: var(--muted); background: rgba(15, 23, 42, 0.8); }

        .link-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px;
            margin-bottom: 8px; text-align: left; transition: 0.2s; }
        .link-item:hover { border-color: var(--accent-blue);
            background: rgba(56, 189, 248, 0.05); }

        .edit-panel-backdrop { position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .edit-panel { background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 25px;
            border-radius: 30px; width: 95%; max-width: 500px; }
    </style>
</head>

    <div class="top-nav">
        <button id="user-demo-btn" class="nav-btn">USER DEMO</button>

    <div class="app-shell">

            <div id="links-buttons-container" style="margin-top: 1.5rem;"></div>

    </div>

        </div>
    </div>

            let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || createDefaultUsers();

            function render() {
                const grid = document.getElementById('users-grid');
                grid.innerHTML = '';
                const searchTerm = document.getElementById('search-users').value.toLowerCase();
                
                users.filter(u => u.name.toLowerCase().includes(searchTerm)).forEach((user, i) => {
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap: 1rem;">
                            <div class="avatar-circle">${i+1}</div>
                            <div style="flex:1">
                                <div style="font-weight:600; font-size: 0.95rem;">${user.name}</div>
                                <div style="font-size: 0.7rem; color: var(--muted);">${user.links.length} Tasks assigned</div>
                            </div>
                            <div style="color: var(--accent-blue);">→</div>
                        </div>
                    `;
                    card.onclick = () => openLinks(user);
                    grid.appendChild(card);
                });
            }

            function openLinks(user) {
                if (!user.links || user.links.length === 0) return alert("No links available.");
                document.getElementById('welcome-page').style.display = 'none';
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('user-links-view').style.display = 'block';
                document.getElementById('links-user-name').textContent = user.name;
                const container = document.getElementById('links-buttons-container');
                container.innerHTML = '';
                user.links.forEach((link, idx) => {
                    if(link.trim() === "") return;
                    const btn = document.createElement('div');
                    btn.className = 'link-item';
                    btn.innerHTML = `<div style="font-size:0.8rem; font-weight:600;">Open Survey #${idx+1}</div><div style="font-size:0.65rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${link}</div>`;
                    btn.onclick = () => window.open(link, '_blank');
                    container.appendChild(btn);
                });
            }

            // Tombol User Demo Langsung Buka Link View
            document.getElementById('user-demo-btn').onclick = () => openLinks(DEMO_USER);

            document.getElementById('search-users').oninput = render;

            document.getElementById('back-from-links').onclick = () => {
                document.getElementById('user-links-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
            };

            document.getElementById('start-btn').onclick = () => {
                document.getElementById('welcome-page').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                render();
            };

            document.getElementById('edit-users-btn').onclick = () => {
                if(prompt("System Password:") === PASSWORD) {
                    document.getElementById('edit-panel-backdrop').style.display = 'flex';
                    const list = document.getElementById('edit-users-list');
                    list.innerHTML = '';
                    users.forEach(u => {
                        const item = document.createElement('div');
                        item.style.marginBottom = '1.2rem';
                        item.innerHTML = `
                            <div style="font-size:0.75rem; margin-bottom:0.4rem; color:var(--accent-blue)">${u.name} (Paste Links Below):</div>
                            <textarea id="links-${u.id}" style="width:100%; height:80px; background:#020617; border:1px solid #1e293b; color:#fff; padding:10px; font-size:0.75rem; border-radius:10px; resize:none;">${u.links.join('\n')}</textarea>
                        `;
                        list.appendChild(item);
                    });
                }
            };

            document.getElementById('edit-save').onclick = () => {
                users.forEach(u => {
                    const txt = document.getElementById(`links-${u.id}`).value;
                    u.links = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                document.getElementById('edit-panel-backdrop').style.display = 'none';
                render();
            };

            document.getElementById('edit-cancel').onclick = () => {
                document.getElementById('edit-panel-backdrop').style.display = 'none';
            };

            render();
        });
    </script>
