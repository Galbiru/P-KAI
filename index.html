<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project KAI - Survey Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        :root {
            /* Theme: Cold, Night, Fog, Calm */
            --primary-main: #64748b;
            --primary-soft: #1e293b;
            --accent-blue: #38bdf8;
            --night-deep: #0f172a;
            --fog-light: rgba(226, 232, 240, 0.1);
            --white-soft: #f8fafc;
            --dark-text: #f1f5f9;
            --muted: #94a3b8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 20px 10px;
            /* Cold Night Foggy Gradient */
            background: 
                linear-gradient(180deg, #020617 0%, #0f172a 40%, #1e293b 100%);
            color: var(--dark-text);
            position: relative;
        }

        /* Fog Overlay Effect */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            border-radius: 26px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 20px 16px 18px;
            position: relative;
            overflow: hidden;
        }

        .app-inner { position: relative; z-index: 1; }
        .fade-transition { transition: opacity 0.35s ease; }

        #edit-users-btn {
            position: fixed; top: 16px; right: 16px; z-index: 50;
            border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.45rem 0.95rem; font-size: 0.75rem; font-weight: 600;
            color: #fff; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px); cursor: pointer;
        }

        .search-input {
            width: 100%; padding: 0.5rem 0.8rem 0.5rem 2.2rem;
            border-radius: 999px; border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(15, 23, 42, 0.5); font-size: 0.8rem;
            color: #fff; outline: none;
        }

        .user-progress-bar { height: 4px; width: 100%; background: rgba(255,255,255,0.05); border-radius: 999px; margin-top: 0.35rem; }
        .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.5s ease; }

        #welcome-page { min-height: 70vh; display: flex; flex-direction: column; justify-content: center; gap: 0.75rem; }
        .welcome-title { font-family: 'Roboto Mono', monospace; font-size: 2rem; font-weight: 700; color: #f8fafc; }
        
        #start-btn {
            margin-top: 1.6rem; padding: 0.75rem 2.5rem; border-radius: 999px;
            border: 1px solid rgba(56, 189, 248, 0.5); font-weight: 700;
            background: rgba(56, 189, 248, 0.1); color: #38bdf8;
            transition: all 0.3s ease; cursor: pointer;
        }
        #start-btn:hover { background: rgba(56, 189, 248, 0.2); transform: translateY(-2px); }

        .project-name { color: var(--accent-blue); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .main-title { font-family: 'Roboto Mono', monospace; font-size: 1.4rem; color: #fff; margin-top: 4px; }

        .user-card {
            position: relative; display: flex; flex-direction: column; gap: 0.5rem;
            padding: 1rem; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03); cursor: pointer;
            transition: all 0.2s ease; margin-bottom: 0.5rem;
        }
        .user-card:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-blue); transform: scale(1.02); }

        .avatar-circle {
            width: 38px; height: 38px; border-radius: 999px;
            background: linear-gradient(135deg, #1e293b, #334155);
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge-link { font-size: 0.7rem; padding: 0.2rem 0.6rem; border-radius: 999px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        
        /* Modal Style */
        .edit-panel {
            background: #0f172a; border: 1px solid rgba(255,255,255,0.1); color: #fff;
            padding: 24px; border-radius: 24px; width: 90%; max-width: 500px;
        }
        .edit-panel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .edit-panel-backdrop.show { display: flex; opacity: 1; }

        @keyframes cardPopIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <button id="edit-users-btn">✎ Settings</button>

    <div class="app-shell">
        <div class="app-inner">
            <div id="welcome-page">
                <div class="project-name">SYSTEM ACCESS</div>
                <h1 class="welcome-title">Project KAI<br>Internal Hub</h1>
                <p style="color: var(--muted); font-size: 0.9rem;">Night operation mode active. Secure access for designated enumerators.</p>
                <button id="start-btn">ACCESS DASHBOARD</button>
            </div>

            <div id="main-view" style="display:none;">
                <div class="project-name">PROJECT KAI</div>
                <h2 class="main-title">Survey Panel</h2>
                
                <div style="margin: 1rem 0;">
                    <input type="text" id="search-users" class="search-input" placeholder="Search enumerator...">
                </div>

                <div id="users-grid"></div>
                
                <div style="text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 1rem;">
                    Status: <span style="color: #22c55e;">● Night Mode Calm</span>
                </div>
            </div>

            <div id="user-links-view" style="display:none;">
                <button id="back-from-links" style="color:var(--accent-blue); font-size: 0.8rem; margin-bottom: 1rem;">← Back</button>
                <h3 id="links-user-name" class="main-title"></h3>
                <div id="links-buttons-container" style="margin-top: 1rem; display:grid; gap: 0.5rem;"></div>
            </div>
        </div>
    </div>

    <div id="edit-panel-backdrop" class="edit-panel-backdrop">
        <div class="edit-panel">
            <h3 class="main-title" style="font-size: 1.1rem;">Manage Project KAI</h3>
            <div id="edit-users-list" style="max-height: 300px; overflow-y: auto; margin: 1rem 0;"></div>
            <div style="display:flex; justify-content: flex-end; gap: 0.5rem;">
                <button id="edit-cancel" style="padding: 0.4rem 1rem; color: #fff;">Cancel</button>
                <button id="edit-save" style="background: var(--accent-blue); color: #000; padding: 0.4rem 1.5rem; border-radius: 999px; font-weight: 600;">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const STORAGE_KEY = "projectKAI_Users_V1";
            const PASSWORD = "Aco123";

            function createDefaultUsers() {
                const names = ['Mawar', 'Lisa', 'Parwati', 'Purwasiyant'];
                return names.map((name, i) => ({
                    id: `kai-${i}`,
                    name: name,
                    mode: 'multi',
                    links: []
                }));
            }

            let users = JSON.parse(localStorage.getItem(STORAGE_KEY)) || createDefaultUsers();

            const welcomePage = document.getElementById('welcome-page');
            const mainView = document.getElementById('main-view');
            const grid = document.getElementById('users-grid');

            function render() {
                grid.innerHTML = '';
                users.forEach((user, i) => {
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap: 1rem;">
                            <div class="avatar-circle">${i+1}</div>
                            <div style="flex:1">
                                <div style="font-weight:600; font-size: 0.9rem;">${user.name}</div>
                                <div style="font-size: 0.7rem; color: var(--muted);">Project KAI • ${user.links.length} Links</div>
                                <div class="user-progress-bar"><div class="progress-fill" style="width:0%"></div></div>
                            </div>
                            <div class="badge-link">></div>
                        </div>
                    `;
                    card.onclick = () => openLinks(user);
                    grid.appendChild(card);
                });
            }

            function openLinks(user) {
                if (user.links.length === 0) {
                    alert("No links assigned to " + user.name);
                    return;
                }
                document.getElementById('main-view').style.display = 'none';
                document.getElementById('user-links-view').style.display = 'block';
                document.getElementById('links-user-name').textContent = user.name;
                const container = document.getElementById('links-buttons-container');
                container.innerHTML = '';
                user.links.forEach((link, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'user-card';
                    btn.style.textAlign = 'left';
                    btn.innerHTML = `<div style="font-size:0.85rem">Link #${idx+1}</div><div style="font-size:0.7rem; color:var(--muted)">${link.substring(0,40)}...</div>`;
                    btn.onclick = () => window.open(link, '_blank');
                    container.appendChild(btn);
                });
            }

            document.getElementById('back-from-links').onclick = () => {
                document.getElementById('user-links-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
            };

            document.getElementById('start-btn').onclick = () => {
                welcomePage.style.display = 'none';
                mainView.style.display = 'block';
                render();
            };

            document.getElementById('edit-users-btn').onclick = () => {
                if(prompt("Password:") === PASSWORD) {
                    document.getElementById('edit-panel-backdrop').classList.add('show');
                    const list = document.getElementById('edit-users-list');
                    list.innerHTML = '';
                    users.forEach(u => {
                        const item = document.createElement('div');
                        item.style.marginBottom = '1rem';
                        item.innerHTML = `
                            <div style="font-size:0.8rem; margin-bottom:0.3rem">${u.name} Links (Paste one per line):</div>
                            <textarea id="links-${u.id}" style="width:100%; height:60px; background:#1e293b; border:1px solid #334155; color:#fff; padding:5px; font-size:0.75rem">${u.links.join('\n')}</textarea>
                        `;
                        list.appendChild(item);
                    });
                }
            };

            document.getElementById('edit-save').onclick = () => {
                users.forEach(u => {
                    const txt = document.getElementById(`links-${u.id}`).value;
                    u.links = txt.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
                document.getElementById('edit-panel-backdrop').classList.remove('show');
                render();
            };

            document.getElementById('edit-cancel').onclick = () => {
                document.getElementById('edit-panel-backdrop').classList.remove('show');
            };

            render();
        });
    </script>
</body>
</html>
